kind = "web"
previewPath = "/"
title = "PetID Tags"
version = "1.0.0"
id = "artifacts/petid"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18964

[services.development]
run = "pnpm --filter @workspace/petid run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/petid", "run", "build" ]
serve = "static"
publicDir = "artifacts/petid/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18964"
BASE_PATH = "/"
